<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinematic trailers, social content, VFX and AI production. Book a call online.">
  <title>Roman Osipenko — Video Production</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶</text></svg>">
</head>
<body>

  <header class="header" id="header">
    <div class="container header__inner">
      <a href="#home" class="header__logo" data-config="name">Roman Osipenko</a>
      <nav class="header__nav" id="headerNav" aria-label="Main navigation"></nav>
      <div class="header__actions">
        <div class="header__cta-group" id="headerCta"></div>
        <button class="header__burger" id="burger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation">
    <div class="mobile-nav__links" id="mobileNavLinks"></div>
    <div class="mobile-nav__cta" id="mobileNavCta"></div>
  </nav>

  <main>

    <!-- Hero — Omni-style fullscreen carousel -->
    <section class="hero-omni" id="home">
      <div class="hero-omni__viewport">
        <div class="hero-omni__track" id="heroTrack"></div>
      </div>
      <div class="hero-omni__bar">
        <span class="hero-omni__label">Explore the latest</span>
        <div class="hero-omni__thumbs" id="heroThumbs" aria-label="Slide thumbnails"></div>
        <div class="hero-omni__nav">
          <button class="hero-omni__arrow" id="heroPrev" aria-label="Previous slide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="hero-omni__arrow" id="heroNext" aria-label="Next slide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Portfolio -->
    <section class="section" id="portfolio">
      <div class="container">
        <div class="section__header section__header--center reveal">
          <h2 class="section-title section-title--underline">Portfolio</h2>
        </div>
        <div class="portfolio__filters-wrap reveal">
          <div class="portfolio__filters" id="portfolioFilters" role="tablist"></div>
        </div>
        <div class="portfolio__grid reveal" id="portfolioGrid" role="tabpanel"></div>
        <div class="portfolio__blocks reveal" id="portfolioBlocks"></div>
      </div>
    </section>

    <!-- About -->
    <section class="section about" id="about">
      <div class="container">
        <div class="section__header section__header--center reveal">
          <h2 class="section-title section-title--underline">About</h2>
        </div>
        <div class="about__grid">
          <div class="about__image reveal">
            <img src="assets/images/about.svg" alt="Photo" id="aboutPhoto" loading="lazy">
          </div>
          <div class="about__content reveal">
            <p class="about__roles" data-config="roles"></p>
            <div id="aboutText"></div>
            <div class="about__stats" id="aboutStats"></div>
            <a href="assets/resume.pdf" class="btn btn--outline about__resume-btn" id="resumeDownload" download>
              View Resume
            </a>
          </div>
        </div>
        <div class="resume__content reveal" id="resumeBlock">
          <div class="resume__skills" id="resumeSkills"></div>
          <div class="resume__timeline" id="resumeTimeline"></div>
        </div>
      </div>
    </section>

    <!-- Process -->
    <section class="section process" id="process">
      <div class="container container--narrow">
        <div class="section__header section__header--center reveal">
          <h2 class="section-title section-title--underline">Process</h2>
          <p class="section-subtitle" id="processDescription"></p>
        </div>
        <div class="process__steps reveal" id="processSteps"></div>
      </div>
    </section>

    <!-- Festivals -->
    <section class="section festivals" id="festivals">
      <div class="container">
        <div class="festival-banner reveal" id="festivalBanner"></div>
      </div>
    </section>

    <!-- Testimonials -->
    <section class="section testimonials" id="testimonials">
      <div class="container">
        <div class="section__header section__header--center reveal">
          <h2 class="section-title section-title--underline">Testimonials</h2>
        </div>
        <div class="testimonials__grid reveal" id="testimonialsGrid"></div>
      </div>
    </section>

    <!-- Contact -->
    <section class="section booking" id="contact">
      <div class="container">
        <div class="section__header section__header--center reveal">
          <h2 class="section-title section-title--underline">Contact</h2>
          <p class="booking__lead">
            Pick a date and time — we'll discuss your project, timeline and scope.
          </p>
        </div>
        <div class="booking__grid reveal">
          <div class="booking__calendar">
            <div class="booking__panel">
              <div class="calendar calendar--compact" id="calendar"></div>
              <div class="time-slots" id="timeSlots" hidden>
                <p class="time-slots__label">Select time</p>
                <div class="time-slots__grid time-slots__grid--compact" id="timeSlotsGrid"></div>
              </div>
            </div>
          </div>
          <div class="booking__fields">
            <div class="booking__panel">
              <form id="bookingForm" novalidate>
                <div class="form-group">
                  <label class="form-label" for="bookingName">Name</label>
                  <input type="text" class="form-input" id="bookingName" name="name" required placeholder="Your name">
                </div>
                <div class="form-group">
                  <label class="form-label" for="bookingEmail">Email</label>
                  <input type="email" class="form-input" id="bookingEmail" name="email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                  <label class="form-label" for="bookingMessage">About the project <span class="form-label-optional">(optional)</span></label>
                  <textarea class="form-textarea" id="bookingMessage" name="message" placeholder="Briefly describe the task"></textarea>
                </div>
                <button type="submit" class="btn btn--primary btn--large form-submit" id="bookingSubmit" disabled>
                  Book a call
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">&copy; <span id="footerYear"></span> <span data-config="name">Roman Osipenko</span></p>
      <div class="footer__links">
        <a href="#portfolio" class="footer__link">Work</a>
        <a href="#about" class="footer__link">About</a>
        <a href="#contact" class="footer__link">Contact</a>
      </div>
    </div>
  </footer>

  <div class="modal" id="videoModal" role="dialog" aria-modal="true" aria-label="Video">
    <button class="modal__close" id="modalClose" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="modal__content">
      <iframe class="modal__iframe" id="modalIframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/portfolio.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
